name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      
      - name: Build release binary
        run: |
          # Estas variables fuerzan a que todo sea estático
          export RUSTFLAGS="-C target-feature=+crt-static"
          cargo build --release --target x86_64-unknown-linux-musl

      - name: Verify Binary
        run: |
          file target/x86_64-unknown-linux-musl/release/rsname
          ldd target/x86_64-unknown-linux-musl/release/rsname || true

      - name: Rename binary
        run: |
          cd target/x86_64-unknown-linux-musl/release
          mv rsname rsname-linux-x86_64
      
      - name: Generate SHA256 checksum
        run: |
          cd target/x86_64-unknown-linux-musl/release
          sha256sum rsname-linux-x86_64 > rsname-linux-x86_64.sha256
      
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/x86_64-unknown-linux-musl/release/rsname-linux-x86_64
            target/x86_64-unknown-linux-musl/release/rsname-linux-x86_64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

